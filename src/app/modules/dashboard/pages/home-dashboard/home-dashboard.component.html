<app-header></app-header>
<div class="container-fluid px-5 py-4">
  <h2 class="h3 text-secondary text-opacity-75 mb-4 fw-normal">Overview</h2>
  <div class="row g-4 mb-5">
    <div class="col-12 col-md-6">
      <app-chart-donut [chartDonutData]="donutData"></app-chart-donut>
    </div>
    <div class="col-12 col-md-6">
      <app-chart-bar [chartBarData]="barData"></app-chart-bar>
    </div>
  </div>
  <h2 class="h3 text-secondary text-opacity-75 mb-4 fw-normal">User List</h2>
  <div class="row">
    <div class="col-12">
      <app-table-user [tableUserData]="userData"></app-table-user>
    </div>
  </div>
</div>
